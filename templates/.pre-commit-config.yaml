---
repos:
    # Python linting and formatting with Ruff
    - repo: https://github.com/astral-sh/ruff-pre-commit
      rev: v0.9.2
      hooks:
          - id: ruff
            name: Ruff Linter
            description: Run Ruff for linting Python code
            args: [--fix, --exit-non-zero-on-fix]
            types: [python]
          - id: ruff-format
            name: Ruff Formatter
            description: Format Python code with Ruff
            types: [python]

    # Dockerfile linting
    - repo: https://github.com/hadolint/hadolint
      rev: v2.12.0
      hooks:
          - id: hadolint-docker
            name: Hadolint
            description: Lint Dockerfiles for best practices
            args: [--ignore, DL3008, --ignore, DL3009]

    # Security and safety checks
    - repo: https://github.com/pre-commit/pre-commit-hooks
      rev: v5.0.0
      hooks:
          - id: check-yaml
            name: Check YAML
            description: Validate YAML syntax
            args: [--unsafe]
            exclude: '^(.gitlab-ci.yml$|.gitlab/.*\.yml$)'
          - id: end-of-file-fixer
            name: Fix End of Files
            description: Ensures files end with newline
          - id: trailing-whitespace
            name: Trim Trailing Whitespace
            description: Remove trailing whitespace
            args: [--markdown-linebreak-ext=md]
          - id: detect-private-key
            name: Detect Private Keys
            description: Prevent committing private keys
          - id: check-symlinks
            name: Check Symlinks
            description: Ensure symlinks point to valid files
          - id: destroyed-symlinks
            name: Detect Destroyed Symlinks
            description: Check for broken symlinks
          - id: check-added-large-files
            name: Check Large Files
            description: Prevent committing large files (>500KB)
            args: [--maxkb=500]
            exclude: '(\.whl$|docs/images/)'
          - id: check-merge-conflict
            name: Check Merge Conflicts
            description: Detect merge conflict markers
          - id: check-case-conflict
            name: Check Case Conflicts
            description: Prevent case-sensitive filename conflicts
          - id: mixed-line-ending
            name: Check Line Endings
            description: Ensure consistent line endings
            args: [--fix=lf]

    # Shell script linting
    - repo: https://github.com/shellcheck-py/shellcheck-py
      rev: v0.10.0.1
      hooks:
          - id: shellcheck
            name: ShellCheck
            description: Lint shell scripts
            args: [--severity=warning]

    # Markdown linting
    - repo: https://github.com/igorshubovych/markdownlint-cli
      rev: v0.43.0
      hooks:
          - id: markdownlint
            name: Markdown Lint
            description: Lint Markdown files
            args: [--fix]
            exclude: '^(CHANGELOG.md|PLANNING-.*.md)'

# Global configuration
default_language_version:
    python: python3.10

ci:
    autofix_commit_msg: |
        [pre-commit.ci] auto fixes from pre-commit hooks
    autofix_prs: true
    autoupdate_commit_msg: '[pre-commit.ci] pre-commit autoupdate'
    autoupdate_schedule: weekly
    skip: [hadolint-docker]
    submodules: false
